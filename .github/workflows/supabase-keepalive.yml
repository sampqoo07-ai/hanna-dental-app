name: Supabase keep-alive

# Supabase 免費版專案閒置 7 天就會被自動暫停。
# 每週一、三、五各 ping 一次（最長間隔 3 天），確保不會被當成閒置。
# 如果哪天 GitHub Actions 自己壞掉，最多多塞個手動 Resume，資料不會掉。

on:
  schedule:
    - cron: "0 9 * * 1,3,5"   # 週一三五 09:00 UTC（台灣 17:00）
  workflow_dispatch:           # 也可以在 Actions 頁手動觸發測試

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping applications table
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          set -u
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_KEY:-}" ]; then
            echo "::error::SUPABASE_URL 或 SUPABASE_KEY secret 沒設定"
            exit 1
          fi
          STATUS=$(curl -sS -o /tmp/db_body -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/applications?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY") || {
              echo "::error::curl 連線失敗：$?"
              exit 1
            }
          echo "DB ping HTTP $STATUS at $(date -u)"
          if [ "$STATUS" != "200" ]; then
            echo "::error::DB ping 沒回 200，response body:"
            cat /tmp/db_body
            exit 1
          fi

      - name: Ping storage bucket
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          set -u
          STATUS=$(curl -sS -o /tmp/storage_body -w "%{http_code}" \
            -X POST "$SUPABASE_URL/storage/v1/object/list/dental-uploads" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"limit":1,"prefix":""}') || {
              echo "::error::curl 連線失敗：$?"
              exit 1
            }
          echo "Storage ping HTTP $STATUS at $(date -u)"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Storage ping 沒回 200，response body:"
            cat /tmp/storage_body
            exit 1
          fi
